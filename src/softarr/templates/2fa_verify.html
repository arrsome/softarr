<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softarr - Two-Factor Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#34d399', 500: '#10b981',
                            600: '#059669', 700: '#047857',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-brand-400">Softarr</h1>
            <p class="text-xs text-zinc-500 mt-1">Two-Factor Authentication</p>
        </div>
        <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800">
            <h2 class="text-lg font-semibold mb-1">Verify your identity</h2>
            <p class="text-sm text-zinc-400 mb-4">
                Open your authenticator app and enter the 6-digit code for
                <span class="text-zinc-200 font-medium">{{ username }}</span>.
            </p>

            {% if error %}
            <div class="bg-red-900/40 border border-red-700 text-red-300 rounded-lg px-3 py-2 text-sm mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form action="/auth/2fa/verify" method="POST">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-zinc-500 mb-1">Authentication Code</label>
                        <input type="text" name="code" required autofocus
                               inputmode="numeric" autocomplete="one-time-code"
                               pattern="[0-9]{6}" maxlength="6" placeholder="000000"
                               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm text-center tracking-widest font-mono focus:outline-none focus:border-brand-500">
                    </div>
                    <button type="submit"
                            class="w-full bg-brand-600 hover:bg-brand-500 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colours">
                        Verify
                    </button>
                </div>
            </form>

            <div class="mt-4 pt-4 border-t border-zinc-800 text-center">
                <a href="/auth/logout" class="text-xs text-zinc-500 hover:text-zinc-300">
                    Cancel and return to login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
