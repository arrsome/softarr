{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto">
    {% if force_change %}
    <div class="bg-amber-950/40 border border-amber-800/50 rounded-xl p-4 mb-6">
        <p class="text-sm text-amber-300">Your password must be changed before you can continue.</p>
    </div>
    {% endif %}

    <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800">
        <h3 class="text-lg font-semibold mb-6">Change Password</h3>

        <div id="policy-rules" class="bg-zinc-800/40 border border-zinc-700/50 rounded-lg p-3 mb-5 text-xs text-zinc-400 hidden">
            <p class="font-medium text-zinc-300 mb-2">Password requirements:</p>
            <ul id="policy-list" class="space-y-1 list-disc list-inside"></ul>
        </div>

        <form id="change-password-form" class="space-y-4">
            <div>
                <label class="block text-xs text-zinc-500 mb-1">Current Password</label>
                <input type="password" id="current-password" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand-500">
            </div>
            <div>
                <label class="block text-xs text-zinc-500 mb-1">New Password</label>
                <input type="password" id="new-password" required
                       oninput="checkPasswordStrength(this.value)"
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand-500">
                <div id="strength-indicator" class="mt-1.5 space-y-1 hidden"></div>
            </div>
            <div>
                <label class="block text-xs text-zinc-500 mb-1">Confirm New Password</label>
                <input type="password" id="confirm-password" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand-500">
            </div>

            <div id="form-error" class="hidden bg-red-950/40 border border-red-800/50 rounded-lg p-3 text-sm text-red-300"></div>
            <div id="form-success" class="hidden bg-green-950/40 border border-green-800/50 rounded-lg p-3 text-sm text-green-300"></div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-brand-600 hover:bg-brand-700 px-5 py-2 rounded-lg text-sm font-medium transition-colors">
                    Change Password
                </button>
                {% if not force_change %}
                <a href="/" class="bg-zinc-700 hover:bg-zinc-600 px-5 py-2 rounded-lg text-sm font-medium transition-colors">
                    Cancel
                </a>
                {% endif %}
            </div>
        </form>
    </div>
</div>

<script>
var csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || '';
var policy = null;

async function loadPolicy() {
    try {
        var resp = await fetch('/api/v1/auth/password-policy');
        if (!resp.ok) return;
        policy = await resp.json();
        var rules = [];
        if (policy.min_length > 0) rules.push('At least ' + policy.min_length + ' characters');
        if (policy.require_uppercase) rules.push('At least one uppercase letter');
        if (policy.require_numbers) rules.push('At least one number');
        if (policy.require_special) rules.push('At least one special character');
        if (rules.length > 0) {
            var list = document.getElementById('policy-list');
            list.innerHTML = rules.map(r => '<li>' + r + '</li>').join('');
            document.getElementById('policy-rules').classList.remove('hidden');
        }
    } catch(e) {}
}

function checkPasswordStrength(value) {
    if (!policy || !value) {
        document.getElementById('strength-indicator').classList.add('hidden');
        return;
    }
    var issues = [];
    if (value.length < (policy.min_length || 12)) issues.push('Too short');
    if (policy.require_uppercase && !/[A-Z]/.test(value)) issues.push('Needs uppercase');
    if (policy.require_numbers && !/\d/.test(value)) issues.push('Needs a number');
    if (policy.require_special && !/[^a-zA-Z0-9]/.test(value)) issues.push('Needs a special character');

    var indicator = document.getElementById('strength-indicator');
    if (issues.length === 0) {
        indicator.innerHTML = '<span class="text-xs text-green-400">Password meets all requirements</span>';
    } else {
        indicator.innerHTML = issues.map(i => '<span class="text-xs text-amber-400">' + i + '</span>').join(' &bull; ');
    }
    indicator.classList.remove('hidden');
}

document.getElementById('change-password-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var errorEl = document.getElementById('form-error');
    var successEl = document.getElementById('form-success');
    errorEl.classList.add('hidden');
    successEl.classList.add('hidden');

    var current = document.getElementById('current-password').value;
    var newPw = document.getElementById('new-password').value;
    var confirm = document.getElementById('confirm-password').value;

    if (newPw !== confirm) {
        errorEl.textContent = 'New passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
    }

    try {
        var resp = await fetch('/api/v1/auth/change-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken},
            body: JSON.stringify({
                current_password: current,
                new_password: newPw,
                confirm_password: confirm,
            }),
        });
        var data = await resp.json();
        if (resp.ok) {
            successEl.textContent = data.message || 'Password changed successfully.';
            successEl.classList.remove('hidden');
            document.getElementById('change-password-form').reset();
            {% if force_change %}
            setTimeout(function() { window.location.href = '/'; }, 1500);
            {% endif %}
        } else {
            var detail = data.detail;
            if (typeof detail === 'object' && detail.errors) {
                errorEl.innerHTML = detail.errors.join('<br>');
            } else {
                errorEl.textContent = typeof detail === 'string' ? detail : 'Password change failed.';
            }
            errorEl.classList.remove('hidden');
        }
    } catch(e) {
        errorEl.textContent = 'Error: ' + e.message;
        errorEl.classList.remove('hidden');
    }
});

loadPolicy();
</script>
{% endblock %}
