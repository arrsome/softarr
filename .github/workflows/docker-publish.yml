name: Docker publish

# Builds and pushes the Softarr container image to Docker Hub.
#
# Triggers:
#   - push to main              -> :latest and :main-<short-sha>
#   - push of a v*.*.* tag      -> :<version> (also updates :latest on default branch)
#   - workflow_dispatch         -> manual rebuild of whatever ref is selected
#
# Auth:
#   - Username: arrsomedev (hardcoded to match the Docker Hub namespace)
#   - Password: ${{ secrets.DOCKER_HUB_SECRET }} -- a Docker Hub access token
#     with Read/Write/Delete scope on arrsomedev/softarr.

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arrsomedev
          password: ${{ secrets.DOCKER_HUB_SECRET }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: arrsomedev/softarr
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache persists built layers across runs, so the dep-install
          # layer in Dockerfile (COPY pyproject.toml uv.lock && uv sync) stays
          # cached until those files change. Note: BuildKit cache mounts
          # (RUN --mount=type=cache,target=/root/.cache/uv) are NOT persisted
          # by type=gha on their own -- wiring in buildkit-cache-dance is a
          # documented follow-up if uv.lock churn becomes a CI-time pain
          # point. See https://docs.docker.com/build/ci/github-actions/cache/.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
