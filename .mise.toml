[settings]
disable_hints = ["python_multi"]
#python.uv_venv_auto = false
#python.compile = true

[[env]]
_.python.venv = { path = ".venv", create = false }

[[env]]
_.source = { path = ".env_dev" }

[tools]
python = { version = '3.14.4', create = false }
uv = 'latest'

# ---------------------------------------------------------------------------
# Venv lifecycle
# ---------------------------------------------------------------------------

[tasks.venv_setup]
description = "Wipe and recreate the local venv (no dependency sync)."
depends = ["venv_rm", "pycache_clean", "venv_create"]

[tasks.venv_create]
hide = true
run = "uv venv --python=$(mise which python) --link-mode=copy --refresh --seed"

[tasks.venv_rm]
hide = true
run = "rm -rf .venv"

[tasks.pycache_clean]
hide = true
run = "find {{config_root}} -type d -name __pycache__ -exec rm -rf {} +"

[tasks.uv_lock]
description = "Regenerate uv.lock from pyproject.toml."
run = "uv lock --link-mode copy --python=./.venv/bin/python"
sources = ["pyproject.toml"]
outputs = ["uv.lock"]

[tasks.uv_full]
dir = "{{config_root}}"
description = "Resync the existing venv (uv sync --all-packages --reinstall)."
run = "uv sync --all-packages --reinstall --group test --group dev"

[tasks.setup]
description = "Full clean setup: wipe venv, clear caches, recreate venv, resync."
depends = ["venv_rm", "pycache_clean", "venv_create", "uv_full"]

# ---------------------------------------------------------------------------
# Format / lint / test
# ---------------------------------------------------------------------------

[tasks.ruff_format]
description = "Ruff format"
run = "ruff format src tests"

[tasks.ruff_check]
description = "Ruff check"
run = "ruff check --fix --unsafe-fixes src tests"

[tasks.format]
alias = "fmt"
description = "Ruff format + ruff check --fix --unsafe-fixes over src and tests."
depends = ["ruff_format", "ruff_check"]

[tasks.test]
description = "Run pytest."
run = "pytest"

[tasks.test_cov]
description = "Run pytest with coverage report (term-missing)."
run = "pytest --cov=src/softarr --cov-report=term-missing"

[tasks.test_fast]
description = "Run pytest stopping at first failure, failed-first ordering."
run = "pytest -x --ff"

[tasks.precommit]
alias = "pc"
description = "Format then test. Run before committing."
depends = ["format"]
depends_post = ["test"]

[tasks.check]
alias = "c"
description = "Read-only lint + format-check + tests. Safe sibling of precommit."
depends = ["lint", "lint_format", "test"]

# ---------------------------------------------------------------------------
# Dev server
# ---------------------------------------------------------------------------

[tasks.dev]
alias = ["d", "serve", "uvicorn"]
description = "Run uvicorn with --reload on 127.0.0.1:8000."
depends = ["first_init"]
run = "uvicorn softarr.main:app --reload --host 127.0.0.1 --port 8000"

[tasks.init]
description = "First-boot init: create tables, softarr.ini, and admin user."
run = "softarr-init"

[tasks.first_init]
description = "If the dev/softarr.db file does not exist, it will run init"
run = '''
#!/usr/bin/env bash
set -euo pipefail
if [ ! -f dev/softarr.db ]; then
  echo "dev/softarr.db not found -- running init..."
  mise run init
else
  echo "dev/softarr.db already exists -- skipping init."
fi
'''

# ---------------------------------------------------------------------------
# Alembic migrations
# ---------------------------------------------------------------------------

[tasks.migrate]
description = "Apply pending Alembic migrations (upgrade head)."
run = "mkdir -p dev && alembic upgrade head"

[tasks.migrate_new]
description = "Generate a new autogenerated Alembic revision. Usage: mise run migrate_new 'your message'."
usage = '''
arg "<msg>" help="Revision message"
'''
run = 'alembic revision --autogenerate -m "{{arg(name="msg")}}"'

[tasks.migrate_down]
description = "Roll back the most recent Alembic migration."
run = "alembic downgrade -1"

[tasks.migrate_status]
description = "Show current Alembic revision and recent history."
run = "alembic current && alembic history --verbose | head -40"

[tasks.db_reset]
description = "DESTRUCTIVE: wipe the local dev SQLite DB and re-run migrations. Dev only."
confirm = "This will wipe dev/softarr.db. Continue?"
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Guard: only run against the default dev SQLite DB under ./dev/.
db_url="${DATABASE_URL:-sqlite+aiosqlite:///./dev/softarr.db}"

if [[ "$db_url" != *"sqlite"* ]]; then
  echo "ERROR: db_reset refuses to run -- DATABASE_URL is not a SQLite URL:" >&2
  echo "       $db_url" >&2
  exit 1
fi

case "$db_url" in
  *"./dev/softarr.db"|*"/dev/softarr.db")
    : ;;
  *)
    echo "ERROR: db_reset refuses to run -- DATABASE_URL does not point at the" >&2
    echo "       default dev database (./dev/softarr.db). Got:" >&2
    echo "       $db_url" >&2
    exit 1
    ;;
esac

mkdir -p dev
echo "Removing local dev/softarr.db ..."
rm -f dev/softarr.db
echo "Re-running migrations ..."
alembic upgrade head
echo "Done."
'''

[tasks.clean]
description = "Remove caches and build artefacts (does not touch .venv or dev/)."
depends = ["pycache_clean"]
run = '''
rm -rf .pytest_cache .ruff_cache .coverage htmlcov dist build .mise-cache
find {{config_root}} -type d -name '*.egg-info' -exec rm -rf {} +
'''

[tasks.version_bump]
run = "./scripts/version_bump.sh"

[tasks.bump]
depends = ["version_bump", "uv_lock"]

[tasks.lint]
run = "ruff check src tests"

[tasks.ruff_format_check]
run = "ruff format --check src tests"

